<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Life360 Monitor — Panel</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0f1117; --panel: #171a23; --panel2: #1e222d; --line: #2a2f3d;
      --text: #e7e9ee; --muted: #9aa2b1; --purple: #7c5cff; --purple2: #a78bfa;
      --green: #22c55e; --amber: #f59e0b; --red: #ef4444;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
    .app { display: grid; grid-template-columns: 340px 1fr; grid-template-rows: 60px 1fr; height: 100vh; }
    header { grid-column: 1 / -1; display: flex; align-items: center; gap: 14px;
      padding: 0 20px; background: var(--panel); border-bottom: 1px solid var(--line); }
    .logo { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, var(--purple), var(--purple2));
      display: grid; place-items: center; font-size: 16px; }
    header h1 { font-size: 15px; font-weight: 700; margin: 0; letter-spacing: .2px; }
    .badge { font-size: 11px; color: var(--muted); background: var(--panel2); padding: 3px 9px;
      border-radius: 999px; border: 1px solid var(--line); }
    .demo { margin-left: auto; font-size: 11px; color: var(--amber); background: rgba(245,158,11,.1);
      padding: 4px 10px; border-radius: 999px; border: 1px solid rgba(245,158,11,.3); }
    .live { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 0 rgba(34,197,94,.5);
      animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,.5);} 70% { box-shadow: 0 0 0 8px rgba(34,197,94,0);} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0);} }
    @keyframes ping { 0% { transform: scale(1); opacity: .4; } 100% { transform: scale(1.8); opacity: 0; } }

    aside { background: var(--panel); border-right: 1px solid var(--line); overflow-y: auto; padding: 14px; }
    .kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .kpi { background: var(--panel2); border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
    .kpi .n { font-size: 22px; font-weight: 800; }
    .kpi .l { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .kpi.alert .n { color: var(--amber); }
    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted);
      margin: 8px 2px 10px; font-weight: 700; }
    .worker { display: flex; gap: 11px; align-items: center; padding: 10px; border-radius: 12px; cursor: pointer;
      border: 1px solid transparent; transition: .15s; }
    .worker:hover { background: var(--panel2); border-color: var(--line); }
    .worker.sel { background: var(--panel2); border-color: var(--purple); }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--panel2); display: grid; place-items: center;
      font-weight: 700; font-size: 15px; border: 2px solid var(--line); position: relative; flex: none; }
    .avatar .st { position: absolute; bottom: -1px; right: -1px; width: 13px; height: 13px; border-radius: 50%;
      border: 2px solid var(--panel); }
    .st.moving { background: var(--green); } .st.idle { background: var(--amber); } .st.off { background: var(--muted); }
    .w-name { font-weight: 600; font-size: 14px; }
    .w-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .w-right { margin-left: auto; text-align: right; }
    .w-km { font-weight: 700; font-size: 14px; } .w-km span { font-size: 11px; color: var(--muted); font-weight: 400; }
    .tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 6px; margin-top: 3px; }
    .tag.moving { background: rgba(34,197,94,.12); color: var(--green); }
    .tag.idle { background: rgba(245,158,11,.12); color: var(--amber); }
    .tag.off { background: rgba(154,162,177,.12); color: var(--muted); }

    main { position: relative; }
    #map { position: absolute; inset: 0; }
    .alerts { position: absolute; top: 14px; right: 14px; width: 300px; z-index: 500; display: flex; flex-direction: column; gap: 8px; }
    .alert-card { background: var(--panel); border: 1px solid rgba(245,158,11,.4); border-left: 3px solid var(--amber);
      border-radius: 10px; padding: 11px 13px; box-shadow: 0 8px 24px rgba(0,0,0,.35); }
    .alert-card .t { font-size: 13px; font-weight: 600; }
    .alert-card .s { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .leaflet-popup-content { font-family: inherit; }
    .pin-lbl { font-weight: 700; }

    /* --- Móvil: mapa grande arriba, lista compacta abajo --- */
    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 54px 62vh 1fr; }
      main { grid-row: 2; grid-column: 1; }
      aside { grid-row: 3; grid-column: 1; border-right: none; border-top: 1px solid var(--line); padding: 10px 12px; }
      header { padding: 0 14px; gap: 10px; }
      header h1 { font-size: 14px; }
      .badge { display: none; }
      .kpis { grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
      .kpi { padding: 8px; }
      .kpi .n { font-size: 17px; }
      .kpi .l { font-size: 9px; }
      .worker { padding: 8px; }
      .alerts { width: auto; left: 10px; right: 10px; top: 10px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">📍</div>
      <h1>Life360 Monitor</h1>
      <span class="badge" id="clock">—</span>
      <span class="demo" id="demoBadge">● DATOS DE DEMO</span>
      <div class="live" style="margin-left:14px"><span class="dot"></span> en vivo</div>
    </header>

    <aside>
      <div class="kpis">
        <div class="kpi"><div class="n" id="kMoving">—</div><div class="l">Trabajando</div></div>
        <div class="kpi alert"><div class="n" id="kIdle">—</div><div class="l">Inactivos</div></div>
        <div class="kpi"><div class="n" id="kKm">—</div><div class="l">Km hoy (total)</div></div>
        <div class="kpi"><div class="n" id="kActive">—</div><div class="l">En turno</div></div>
      </div>
      <div class="section-title">Trabajadores</div>
      <div id="workerList"></div>
    </aside>

    <main>
      <div id="map"></div>
      <div class="alerts" id="alerts"></div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=2"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
