<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reporte del día — EPWQ Monitor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root{--bg:#0f1117;--panel:#171a23;--panel2:#1e222d;--line:#2a2f3d;--text:#e7e9ee;
      --muted:#9aa2b1;--purple:#7c5cff;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;}
    *{box-sizing:border-box;} body{margin:0;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;}
    header{padding:16px 18px;background:var(--panel);border-bottom:1px solid var(--line);}
    h1{margin:0;font-size:18px;} .sub{color:var(--muted);font-size:13px;margin-top:3px;}
    .wrap{max-width:820px;margin:0 auto;padding:14px;}
    .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0;}
    .tile{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center;}
    .tile .n{font-size:20px;font-weight:800;} .tile.idle .n{color:var(--amber);}
    .tile .l{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.4px;}
    #map{height:44vh;min-height:300px;border-radius:14px;border:1px solid var(--line);margin-bottom:14px;}
    .section{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);
      font-weight:700;margin:16px 2px 8px;}
    .stop{display:flex;gap:12px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);
      border-left:3px solid var(--amber);border-radius:10px;padding:11px 13px;margin-bottom:8px;}
    .stop .num{background:var(--amber);color:#0f1117;font-weight:800;min-width:26px;height:26px;border-radius:50%;
      display:grid;place-items:center;font-size:13px;flex:none;}
    .stop .body{flex:1;} .stop .t{font-weight:600;font-size:14px;}
    .stop .a{color:var(--muted);font-size:13px;margin-top:2px;}
    .stop .d{font-weight:800;color:var(--amber);white-space:nowrap;}
    .empty{color:var(--muted);text-align:center;padding:20px;font-size:14px;}
    .foot{color:var(--muted);font-size:11px;text-align:center;margin:18px 0;}
    @media(max-width:560px){.tiles{grid-template-columns:repeat(2,1fr);}}
  </style>
</head>
<body>
  <header><div class="wrap" style="padding:0">
    <h1 id="title">Reporte del día</h1>
    <div class="sub" id="subtitle">Cargando…</div>
  </div></header>
  <div class="wrap">
    <div class="tiles">
      <div class="tile"><div class="n" id="tHoras">—</div><div class="l">Horas trabajadas</div></div>
      <div class="tile"><div class="n" id="tKm">—</div><div class="l">Distancia (km)</div></div>
      <div class="tile idle"><div class="n" id="tIdle">—</div><div class="l">Tiempo inactivo</div></div>
      <div class="tile idle"><div class="n" id="tStops">—</div><div class="l">Paradas largas</div></div>
    </div>
    <div id="map"></div>
    <div class="section">Inactividades (parado más de 5 min)</div>
    <div id="stops"></div>
    <div class="foot">EPWQ — Monitor de Ubicación · Reporte generado automáticamente</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=4"></script>
  <script>
  const P = new URLSearchParams(location.search);
  const WORKER = P.get("w");
  const DAY = P.get("d") || new Date().toLocaleDateString("en-CA", {timeZone:"America/Denver"});
  const fmtTime = (iso) => iso ? new Date(iso).toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit",timeZone:"America/Denver"}) : "—";
  const fmtDur = (m) => { m=Math.round(m); const h=Math.floor(m/60), mm=m%60; return h? `${h}h ${mm}m` : `${mm}m`; };

  async function geocode(lat,lng){
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`,
        {headers:{"Accept":"application/json"}});
      const j=await r.json(); const a=j.address||{};
      const l1=[a.house_number,a.road].filter(Boolean).join(" ");
      const city=a.city||a.town||a.village||a.suburb||"";
      return [l1,city].filter(Boolean).join(", ") || j.display_name || `${(+lat).toFixed(5)}, ${(+lng).toFixed(5)}`;
    }catch{ return `${(+lat).toFixed(5)}, ${(+lng).toFixed(5)}`; }
  }
  const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));

  async function main(){
    if(!WORKER){ document.getElementById("subtitle").textContent="Falta el trabajador (?w=)"; return; }
    const sb=supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    const {data:rep, error}=await sb.rpc("trk_day_report",{p_worker:WORKER, p_day:DAY});
    if(error||!rep){ document.getElementById("subtitle").textContent="No se pudo cargar el reporte."; return; }

    const dayLabel=new Date(DAY+"T12:00:00").toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long",timeZone:"America/Denver"});
    document.getElementById("title").textContent=`Reporte de ${rep.name||WORKER}`;
    document.getElementById("subtitle").textContent=`${dayLabel} · Turno ${fmtTime(rep.shift_in)} – ${fmtTime(rep.shift_out)}`;

    // Horas trabajadas
    let hrs="—";
    if(rep.shift_in&&rep.shift_out){ const ms=new Date(rep.shift_out)-new Date(rep.shift_in); hrs=(ms/3600000).toFixed(1)+"h"; }
    document.getElementById("tHoras").textContent=hrs;
    document.getElementById("tKm").textContent=rep.distance_km ?? "—";
    document.getElementById("tIdle").textContent=fmtDur(rep.total_idle_min||0);
    document.getElementById("tStops").textContent=(rep.idle||[]).length;

    // Mapa + ruta
    const map=L.map("map",{attributionControl:false}).setView([31.86,-106.42],13);
    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19}).addTo(map);
    const route=(rep.route||[]).map(p=>[p[0],p[1]]);
    if(route.length>1){
      const line=L.polyline(route,{color:"#22c55e",weight:3.5,opacity:.9}).addTo(map);
      map.fitBounds(line.getBounds(),{padding:[30,30]});
    }
    // Marcadores de inactividad numerados
    const idle=rep.idle||[];
    idle.forEach((s,i)=>{
      L.marker([s.lat,s.lng],{icon:L.divIcon({className:"",html:
        `<div style="transform:translate(-50%,-50%);background:#f59e0b;color:#0f1117;font-weight:800;
         width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:12px;
         border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)">${i+1}</div>`})}).addTo(map);
    });

    // Lista de paradas (con dirección geocodificada, una por una)
    const box=document.getElementById("stops");
    if(!idle.length){ box.innerHTML='<div class="empty">Sin inactividades largas 🎉 — se mantuvo en movimiento.</div>'; return; }
    idle.forEach((s,i)=>{
      const el=document.createElement("div"); el.className="stop"; el.id="stop"+i;
      el.innerHTML=`<div class="num">${i+1}</div><div class="body">
        <div class="t">${fmtTime(s.start)} – ${fmtTime(s.end)}</div>
        <div class="a">Buscando dirección…</div></div>
        <div class="d">${fmtDur(s.min)}</div>`;
      box.appendChild(el);
    });
    // Geocode secuencial (respeta el límite de OpenStreetMap: 1/seg)
    for(let i=0;i<idle.length;i++){
      const addr=await geocode(idle[i].lat, idle[i].lng);
      const el=document.querySelector(`#stop${i} .a`); if(el) el.textContent=addr;
      await sleep(1100);
    }
  }
  main();
  </script>
</body>
</html>
